<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dave&amp;mike</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    /* ── Brand tokens ── */
    :root {
      --accent:     #5E82A0;   /* slate blue — confirmed */
      --bg-right:   #F0EDE7;   /* warm cream — right panel */
      --text:       #1C1A18;   /* near-black */
      --text-muted: #8A7F76;   /* warm grey */
      --rule:       #D8D2CA;   /* thin rule color */
    }

    body {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden; /* single-screen landing */
    }

    /* ══════════════════════════════════════
       TWO-PANEL LAYOUT
    ══════════════════════════════════════ */
    .page {
      display: grid;
      grid-template-columns: 52fr 48fr;
      height: 100vh;
      min-height: 600px;
    }

    /* ── LEFT PANEL ─────────────────────── */
    .panel-left {
      position: relative;
      overflow: hidden;
    }

    /* ── Ken Burns Carousel ─────────────────────────────────
       Full-bleed photo carousel. 8 slides, no controls.
       Each slide: 7s display + 1.5s crossfade = 8.5s interval.
       Total cycle: ~68 seconds before repeat.
       Ken Burns: scale 1.0→1.08 + subtle directional pan.
    ─────────────────────────────────────────────────────── */
    .carousel-slide {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      opacity: 0;
      z-index: 1;
      transition: opacity 1.5s ease-in-out;
      transform-origin: center center;
      will-change: transform, opacity;
    }

    .carousel-slide.active {
      opacity: 1;
      z-index: 2;
    }

    /* ── Ken Burns keyframes — 8 directional variants ── */
    @keyframes kb-right-down {
      from { transform: scale(1.0)  translate(0%,     0%);   }
      to   { transform: scale(1.08) translate(1.5%,   1%);   }
    }
    @keyframes kb-left-up {
      from { transform: scale(1.0)  translate(0%,     0%);   }
      to   { transform: scale(1.08) translate(-1.5%,  -1%);  }
    }
    @keyframes kb-right-up {
      from { transform: scale(1.0)  translate(0%,     0%);   }
      to   { transform: scale(1.08) translate(1.5%,   -1%);  }
    }
    @keyframes kb-left-down {
      from { transform: scale(1.0)  translate(0%,     0%);   }
      to   { transform: scale(1.08) translate(-1.5%,  1%);   }
    }
    @keyframes kb-up-right {
      from { transform: scale(1.0)  translate(0%,     0%);   }
      to   { transform: scale(1.08) translate(1%,     -1.5%);}
    }
    @keyframes kb-down-left {
      from { transform: scale(1.0)  translate(0%,     0%);   }
      to   { transform: scale(1.08) translate(-1%,    1.5%); }
    }
    @keyframes kb-up-left {
      from { transform: scale(1.0)  translate(0%,     0%);   }
      to   { transform: scale(1.08) translate(-1%,    -1.5%);}
    }
    @keyframes kb-down-right {
      from { transform: scale(1.0)  translate(0%,     0%);   }
      to   { transform: scale(1.08) translate(1%,     1.5%); }
    }

    /* ── RIGHT PANEL ────────────────────── */
    .panel-right {
      background: var(--bg-right);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 4rem 3rem 3.5rem;
    }

    .brand-block {
      display: flex;
      flex-direction: column;
      gap: 0;
      max-width: 380px;
      width: 100%;
    }

    /* ── Logo ── */
    .logo-wrap {
      width: 134px;
      margin-bottom: 1.5rem;
    }

    .logo-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── esperienze ── */
    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-style: italic;
      font-size: clamp(3.2rem, 5vw, 5rem);
      line-height: 1.05;
      letter-spacing: 0.01em;
      color: var(--text);
      margin-bottom: 0.85rem;
    }

    /* ── Definition ── */
    .definition {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: clamp(0.78rem, 1vw, 0.9rem);
      color: var(--text-muted);
      line-height: 1.6;
      letter-spacing: 0.01em;
      margin-bottom: 1.75rem;
    }

    /* ── Rule ── */
    .divider {
      border: none;
      border-top: 1px solid var(--rule);
      margin-bottom: 1.75rem;
    }

    /* ── Nav ── */
    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
      flex-wrap: wrap;
    }

    .nav-links a {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: clamp(0.82rem, 1.1vw, 0.95rem);
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.04em;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      transition: color 0.2s ease;
    }

    .nav-links a .arrow {
      color: var(--accent);
      font-size: 0.8em;
      transition: transform 0.2s ease;
    }

    .nav-links a:hover { color: var(--accent); }
    .nav-links a:hover .arrow { transform: translateX(3px); }

    /* ══════════════════════════════════════
       RESPONSIVE — stack below 780px
    ══════════════════════════════════════ */
    @media (max-width: 780px) {
      body { overflow: auto; }

      .page {
        grid-template-columns: 1fr;
        grid-template-rows: 55vh auto;
        height: auto;
      }

      .panel-right {
        padding: 3rem 2rem;
      }

      .brand-block {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

<div class="page">

  <!-- ══════════════════════════════════════
       LEFT — Ken Burns photo carousel
       Slides 1–8, auto-advance, no controls
  ══════════════════════════════════════ -->
  <div class="panel-left">

    <img class="carousel-slide" src="my_table_setting.JPG"    alt="Table setting"      data-kb="kb-right-down">
    <img class="carousel-slide" src="beach_umbrella.jpg"      alt="Beach umbrella"     data-kb="kb-left-up">
    <img class="carousel-slide" src="biking.jpg"              alt="Biking"             data-kb="kb-right-up">
    <img class="carousel-slide" src="cooking.jpg"             alt="Cooking"            data-kb="kb-left-down">
    <img class="carousel-slide" src="dave_cinque.jpg"         alt="Cinque Terre"       data-kb="kb-up-right">
    <img class="carousel-slide" src="firenze.jpg"             alt="Firenze"            data-kb="kb-down-left">
    <img class="carousel-slide" src="music_man.jpg"           alt="Music"              data-kb="kb-up-left">
    <img class="carousel-slide" src="the_david_shadow.jpg"    alt="The David shadow"   data-kb="kb-down-right">

  </div>


  <!-- ══════════════════════════════════════
       RIGHT — brand block
  ══════════════════════════════════════ -->
  <div class="panel-right">

    <div class="brand-block">

      <!-- Logo: dnm_logo.svg — self-contained, PNG embedded in Illustrator export -->
      <div class="logo-wrap">
        <img src="assets/dnm_logo.svg" alt="dave&amp;mike">
      </div>

      <!-- Tagline -->
      <h1 class="tagline">esperienze</h1>

      <!-- Definition -->
      <p class="definition">(noun)&nbsp; a life shared — travel, food, family &amp; more</p>

      <!-- Rule -->
      <hr class="divider">

      <!-- Navigation -->
      <ul class="nav-links">
        <li><a href="#">Travel <span class="arrow">→</span></a></li>
        <li><a href="#">Kitchen <span class="arrow">→</span></a></li>
        <li><a href="#">Family <span class="arrow">→</span></a></li>
      </ul>

    </div><!-- .brand-block -->

  </div><!-- .panel-right -->

</div><!-- .page -->


<script>
  /* Ken Burns carousel — 8 slides, auto-advance, no controls, vanilla JS
     Display: 7s per slide  |  Crossfade: 1.5s  |  Interval: 8.5s  |  Cycle: ~68s
  */
  (function () {
    var slides   = document.querySelectorAll('.carousel-slide');
    var INTERVAL = 8500;   /* ms between transitions: 7000 display + 1500 fade */
    var FADE     = 1500;   /* ms — must match CSS transition duration            */
    var ANIM_DUR = (INTERVAL / 1000) + 's';
    var current  = 0;

    function activate(index) {
      var slide = slides[index];
      var anim  = slide.getAttribute('data-kb');
      /* Force animation restart on each activation */
      slide.style.animation = 'none';
      slide.getBoundingClientRect(); /* reflow */
      slide.style.animation = anim + ' ' + ANIM_DUR + ' ease-in-out forwards';
      slide.style.zIndex = '2';
      slide.classList.add('active');
    }

    function deactivate(index) {
      slides[index].classList.remove('active');
      slides[index].style.zIndex = '1';
    }

    /* Start first slide immediately */
    activate(0);

    setInterval(function () {
      var next    = (current + 1) % slides.length;
      var outgoing = current;

      activate(next);

      /* Remove outgoing after crossfade completes */
      setTimeout(function () {
        deactivate(outgoing);
      }, FADE);

      current = next;
    }, INTERVAL);
  })();
</script>
</body>
</html>
