<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dave&amp;mike</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    /* ── Brand tokens ── */
    :root {
      --accent:     #5E82A0;   /* slate blue — confirmed */
      --bg-right:   #F0EDE7;   /* warm cream — right panel */
      --text:       #1C1A18;   /* near-black */
      --text-muted: #8A7F76;   /* warm grey */
      --rule:       #D8D2CA;   /* thin rule color */
    }

    body {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden; /* single-screen landing */
    }

    /* ══════════════════════════════════════
       TWO-PANEL LAYOUT
    ══════════════════════════════════════ */
    .page {
      display: grid;
      grid-template-columns: 52fr 48fr;
      height: 100vh;
      min-height: 600px;
    }

    /* ── LEFT PANEL ─────────────────────── */
    .panel-left {
      position: relative;
      overflow: hidden;
    }

    .panel-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
    }

    /* ── ARM + PHONE IMAGE ZONE ─────────────────────────── */
    .phone-zone {
      position: absolute;
      left: -6%;             /* arm bleeds off left edge */
      bottom: -6%;           /* arm exits at bottom edge — no floating elbow */
      transform: rotate(4deg);
      width: 64%;            /* larger — pulled-back table perspective */
      aspect-ratio: 800 / 1028;
    }

    /* arm+phone image */
    .phone-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* ── Phone screen carousel overlay ──────────────────────
       Measured from arm_phone.png (800×1028px, transparent PNG):
         Screen center:  65% left, 38.6% top of image
         Screen size:    ~25% W × ~45% H of container
         Screen rotation: ~15° clockwise (matching phone tilt in photo)
         Border-radius:  8% (phone screen corner rounding)
    ─────────────────────────────────────────────────────── */
    .phone-screen {
      position: absolute;
      left: 65%;
      top: 38.6%;
      width: 25%;
      height: 45%;
      transform: translate(-50%, -50%) rotate(15deg);
      overflow: hidden;
      border-radius: 8%;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.8s ease-in-out;
    }
    .slide.slide-active {
      opacity: 1;
    }

    /* ── RIGHT PANEL ────────────────────── */
    .panel-right {
      background: var(--bg-right);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 4rem 3rem 3.5rem;
    }

    .brand-block {
      display: flex;
      flex-direction: column;
      gap: 0;
      max-width: 380px;
      width: 100%;
    }

    /* ── Logo ── */
    .logo-wrap {
      width: 134px;
      margin-bottom: 1.5rem;
    }

    .logo-wrap svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── esperienze ── */
    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-style: italic;
      font-size: clamp(3.2rem, 5vw, 5rem);
      line-height: 1.05;
      letter-spacing: 0.01em;
      color: var(--text);
      margin-bottom: 0.85rem;
    }

    /* ── Definition ── */
    .definition {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: clamp(0.78rem, 1vw, 0.9rem);
      color: var(--text-muted);
      line-height: 1.6;
      letter-spacing: 0.01em;
      margin-bottom: 1.75rem;
    }

    /* ── Rule ── */
    .divider {
      border: none;
      border-top: 1px solid var(--rule);
      margin-bottom: 1.75rem;
    }

    /* ── Nav ── */
    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
      flex-wrap: wrap;
    }

    .nav-links a {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: clamp(0.82rem, 1.1vw, 0.95rem);
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.04em;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      transition: color 0.2s ease;
    }

    .nav-links a .arrow {
      color: var(--accent);
      font-size: 0.8em;
      transition: transform 0.2s ease;
    }

    .nav-links a:hover { color: var(--accent); }
    .nav-links a:hover .arrow { transform: translateX(3px); }

    /* ══════════════════════════════════════
       RESPONSIVE — stack below 780px
    ══════════════════════════════════════ */
    @media (max-width: 780px) {
      body { overflow: auto; }

      .page {
        grid-template-columns: 1fr;
        grid-template-rows: 55vh auto;
        height: auto;
      }

      .phone-zone {
        left: -4%;
        bottom: -4%;
        transform: rotate(4deg);
        width: 72%;
        aspect-ratio: 800 / 1028;
      }

      .panel-right {
        padding: 3rem 2rem;
      }

      .brand-block {
        max-width: 100%;
      }
    }
  </style>
</head>

<div class="page">

       LEFT — table setting photo + arm+phone
  ══════════════════════════════════════ -->
  <div class="panel-left">

    <img class="panel-bg"

         alt="Elegant table setting">

    <!-- PHONE ZONE — arm_phone.png (800×1028, transparent PNG) -->
    <div class="phone-zone">
      <img src="arm_phone.png" class="phone-img" alt="">
      <!-- Carousel overlaid on white screen area.
           3 placeholder slides — swap .style background for real <img> tags when Dave provides photos.
           Auto-advances every 4s with crossfade. -->
      <div class="phone-screen">
        <div class="slide slide-active" style="background:#5E82A0"></div>
        <div class="slide" style="background:#F0EDE7"></div>
        <div class="slide" style="background:#8B4030"></div>
      </div>
    </div>

  </div>

  /* Carousel — crossfade every 4 seconds
     To swap in real photos: replace each <div class="slide" style="background:...">
     with <img class="slide" src="your-photo.jpg" style="object-fit:cover;width:100%;height:100%">
  */
  (function () {
    var slides = document.querySelectorAll('.phone-screen .slide');
    var current = 0;
    setInterval(function () {
      slides[current].classList.remove('slide-active');
      current = (current + 1) % slides.length;
      slides[current].classList.add('slide-active');
    }, 4000);
  })();
